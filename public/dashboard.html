<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rocard Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#07111f;
      font-family:Arial;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:rgba(0,255,255,0.08);
      filter:blur(120px);
      z-index:0;
    }

  </style>

</head>

<body class="text-white min-h-screen pb-32 relative">

  <!-- GLOW -->
  <div class="glow top-[-200px] left-[-150px]"></div>
  <div class="glow bottom-[-200px] right-[-150px]"></div>

  <!-- AUTH -->
  <script>

    const token =
    localStorage.getItem("token");

    if(!token){

      window.location.href = "/";

    }

  </script>

  <!-- NAVBAR -->
  <nav class="glass sticky top-0 z-50 p-5 flex justify-between items-center">

    <div>

      <h1 class="text-3xl font-bold text-cyan-400">
        Rocard
      </h1>

      <p class="text-gray-400 text-sm">
        Banking Dashboard
      </p>

    </div>

    <button
      onclick="logout()"
      class="bg-red-500 px-5 py-2 rounded-xl font-bold"
    >
      Logout
    </button>

  </nav>

  <!-- MAIN -->
  <main class="p-5 relative z-10">

    <!-- BALANCE -->
    <section class="glass rounded-[35px] p-7 shadow-2xl">

      <div class="flex justify-between items-start">

        <div>

          <p class="text-gray-400">
            TOTAL BALANCE
          </p>

          <h2
            id="balance"
            class="text-5xl font-bold mt-3"
          >
            $0.00
          </h2>

          <p class="text-gray-400 mt-3">
            Earnings from completed work
          </p>

        </div>

        <div class="w-16 h-16 rounded-2xl bg-cyan-400 flex items-center justify-center text-black text-3xl">
          💳
        </div>

      </div>

      <button
        onclick="openWithdraw()"
        class="mt-8 w-full bg-cyan-400 text-black py-4 rounded-2xl font-bold"
      >
        Withdraw Balance
      </button>

    </section>

    <!-- LOA -->
    <section class="glass rounded-3xl p-6 mt-8">

      <div class="flex items-center gap-4">

        <div class="text-5xl">
          📝
        </div>

        <div>

          <h2 class="text-2xl font-bold">
            LOA Requests
          </h2>

          <p class="text-gray-400 mt-2">
            Submit Leave Of Absence requests directly to management.
          </p>

        </div>

      </div>

      <button
        onclick="openLOA()"
        class="mt-6 w-full bg-cyan-400 text-black py-4 rounded-2xl font-bold"
      >
        Submit LOA
      </button>

    </section>

    <!-- SETTINGS -->
    <section class="glass rounded-3xl p-6 mt-8">

      <div class="flex items-center gap-4">

        <div class="text-5xl">
          ⚙️
        </div>

        <div>

          <h2 class="text-2xl font-bold">
            Settings
          </h2>

          <p class="text-gray-400 mt-2">
            Manage account preferences and local data.
          </p>

        </div>

      </div>

      <div class="grid grid-cols-1 gap-4 mt-6">

        <button
          onclick="changeUsername()"
          class="glass p-4 rounded-2xl text-left"
        >
          Change Username
        </button>

        <button
          onclick="clearData()"
          class="glass p-4 rounded-2xl text-left"
        >
          Clear Local Data
        </button>

      </div>

    </section>

    <!-- ACTIVITY -->
    <section class="mt-8">

      <h2 class="text-2xl font-bold mb-5">
        Recent Activity
      </h2>

      <div
        id="activity"
        class="glass rounded-3xl p-5 space-y-5"
      >

        <div class="flex justify-between items-center">

          <div>

            <h3 class="font-bold">
              Account Created
            </h3>

            <p class="text-gray-400 text-sm">
              Welcome to Rocard
            </p>

          </div>

          <span class="text-cyan-400">
            Success
          </span>

        </div>

      </div>

    </section>

  </main>

  <!-- LOA MODAL -->
  <div
    id="loaBox"
    class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-5"
  >

    <div class="glass rounded-[35px] p-8 w-full max-w-md">

      <h2 class="text-3xl font-bold text-cyan-400 mb-6">
        Submit LOA
      </h2>

      <form id="loaForm" class="space-y-5">

        <input
          id="loaDiscord"
          type="text"
          placeholder="Discord Username"
          class="w-full p-4 rounded-2xl bg-white/10 outline-none"
        />

        <input
          id="loaDays"
          type="number"
          placeholder="How many days?"
          class="w-full p-4 rounded-2xl bg-white/10 outline-none"
        />

        <textarea
          id="loaReason"
          placeholder="Reason for LOA"
          class="w-full p-4 rounded-2xl bg-white/10 outline-none h-32 resize-none"
        ></textarea>

        <button
          type="submit"
          class="w-full bg-cyan-400 text-black py-4 rounded-2xl font-bold"
        >
          Submit LOA
        </button>

      </form>

      <button
        onclick="closeLOA()"
        class="mt-4 w-full glass py-4 rounded-2xl"
      >
        Close
      </button>

    </div>

  </div>

  <!-- MOBILE NAV -->
  <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-around z-50">

    <button class="text-cyan-400 font-bold">
      Home
    </button>

    <button onclick="openLOA()">
      LOA
    </button>

    <button onclick="openWithdraw()">
      Withdraw
    </button>

    <button onclick="scrollTo(0,document.body.scrollHeight)">
      Settings
    </button>

  </div>

  <script>

   // BALANCE
const balanceText =
document.getElementById("balance");

async function loadBalance(){

  try {

    const token =
    localStorage.getItem("token");

    const req =
    await fetch("/api/get-user",{

      headers:{
        "Authorization":token
      }

    });

    const data =
    await req.json();

    if(data.success){

      balanceText.innerText =
      "$" + Number(data.balance || 0).toFixed(2);

    }

  } catch(err){

    console.log(err);

  }

}

loadBalance();

    // ACTIVITY
    function addActivity(title,desc){

      const activity =
      document.getElementById("activity");

      const div =
      document.createElement("div");

      div.className =
      "flex justify-between items-center";

      div.innerHTML = `

        <div>

          <h3 class="font-bold">
            ${title}
          </h3>

          <p class="text-gray-400 text-sm">
            ${desc}
          </p>

        </div>

        <span class="text-cyan-400">
          Success
        </span>

      `;

      activity.prepend(div);

    }

    // WITHDRAW
    function openWithdraw(){

      alert(
        "To withdraw your balance, open a support ticket in the Rocard Discord server."
      );

    }

    // SETTINGS
    function changeUsername(){

      const username =
      prompt("Enter new username");

      if(username){

        localStorage.setItem(
          "username",
          username
        );

        alert("Username updated");

      }

    }

    function clearData(){

      if(confirm("Clear all local data?")){

        localStorage.clear();

        location.reload();

      }

    }

    // LOA
    const loaBox =
    document.getElementById("loaBox");

    function openLOA(){

      loaBox.classList.remove("hidden");

    }

    function closeLOA(){

      loaBox.classList.add("hidden");

    }

    // LOA SUBMIT
    document
    .getElementById("loaForm")
    .addEventListener("submit", async (e) => {

      e.preventDefault();

      const discord =
      document.getElementById("loaDiscord").value;

      const days =
      document.getElementById("loaDays").value;

      const reason =
      document.getElementById("loaReason").value;

      // DISCORD WEBHOOK
      const webhook =
      "https://discord.com/api/webhooks/1505639490096599210/NK_QjRpW7GXfhPDqJIzws3Qah54Yzu_iJIzzSlXgKWggvUQorxY6tqw6qsBk_hHxgoEl";

      await fetch(webhook,{

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          embeds:[{

            title:"New LOA Request",

            color:65535,

            fields:[

              {
                name:"Discord Username",
                value:discord
              },

              {
                name:"Days",
                value:days
              },

              {
                name:"Reason",
                value:reason
              }

            ]

          }]

        })

      });

      closeLOA();

      addActivity(
        "LOA Submitted",
        "LOA request sent to management"
      );

      alert(
        "LOA submitted successfully"
      );

    });

    // LOGOUT
    function logout(){

      localStorage.removeItem("token");

      window.location.href = "/";

    }

  </script>

</body>
</html>
