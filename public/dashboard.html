<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rocard Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#07111f;
      font-family:Arial;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
    }

  </style>

</head>

<body class="text-white min-h-screen pb-32">

  <!-- AUTH -->
  <script>

    const token =
    localStorage.getItem("token");

    if(!token){

      window.location.href = "/";

    }

  </script>

  <!-- NAVBAR -->
  <nav class="glass sticky top-0 z-50 p-5 flex justify-between items-center">

    <div>

      <h1 class="text-3xl font-bold text-cyan-400">
        Rocard
      </h1>

      <p class="text-gray-400 text-sm">
        Mobile Banking Dashboard
      </p>

    </div>

    <button
      onclick="logout()"
      class="bg-red-500 px-5 py-2 rounded-xl font-bold"
    >
      Logout
    </button>

  </nav>

  <!-- MAIN -->
  <main class="p-5">

    <!-- BALANCE CARD -->
    <section class="glass rounded-[35px] p-7 shadow-2xl">

      <div class="flex justify-between items-start">

        <div>

          <p class="text-gray-400">
            Total Balance
          </p>

          <h2 class="text-5xl font-bold mt-3">
            $0.00
          </h2>

        </div>

        <div class="w-16 h-16 rounded-2xl bg-cyan-400 flex items-center justify-center text-black text-3xl">
          💳
        </div>

      </div>

      <div class="grid grid-cols-2 gap-4 mt-8">

        <button class="bg-cyan-400 text-black py-4 rounded-2xl font-bold">
          Deposit
        </button>

        <button class="glass py-4 rounded-2xl font-bold">
          Withdraw
        </button>

      </div>

    </section>

    <!-- QUICK ACTIONS -->
    <section class="mt-8">

      <h2 class="text-2xl font-bold mb-5">
        Quick Actions
      </h2>

      <div class="grid grid-cols-2 gap-5">

        <div class="glass rounded-3xl p-6">

          <div class="text-5xl">
            📋
          </div>

          <h3 class="text-xl font-bold mt-4">
            Tasks
          </h3>

          <p class="text-gray-400 mt-2 text-sm">
            Complete activities
          </p>

        </div>

        <div class="glass rounded-3xl p-6">

          <div class="text-5xl">
            💰
          </div>

          <h3 class="text-xl font-bold mt-4">
            Rewards
          </h3>

          <p class="text-gray-400 mt-2 text-sm">
            Claim bonuses
          </p>

        </div>

        <div class="glass rounded-3xl p-6">

          <div class="text-5xl">
            ⚡
          </div>

          <h3 class="text-xl font-bold mt-4">
            Fast Access
          </h3>

          <p class="text-gray-400 mt-2 text-sm">
            Smooth performance
          </p>

        </div>

        <div class="glass rounded-3xl p-6">

          <div class="text-5xl">
            🔒
          </div>

          <h3 class="text-xl font-bold mt-4">
            Security
          </h3>

          <p class="text-gray-400 mt-2 text-sm">
            Protected account
          </p>

        </div>

      </div>

    </section>

    <!-- TRANSACTIONS -->
    <section class="mt-8">

      <h2 class="text-2xl font-bold mb-5">
        Recent Activity
      </h2>

      <div class="glass rounded-3xl p-5 space-y-5">

        <div class="flex justify-between items-center">

          <div>

            <h3 class="font-bold">
              Account Created
            </h3>

            <p class="text-gray-400 text-sm">
              Welcome to Rocard
            </p>

          </div>

          <span class="text-cyan-400">
            Success
          </span>

        </div>

      </div>

    </section>

  </main>

  <!-- MOBILE NAV -->
  <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-around">

    <button class="text-cyan-400 font-bold">
      Home
    </button>

    <button>
      Tasks
    </button>

    <button>
      Rewards
    </button>

    <button>
      Settings
    </button>

  </div>

  <script>

    function logout(){

      localStorage.removeItem("token");

      window.location.href = "/";

    }

  </script>

</body>
</html>
