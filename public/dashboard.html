<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Rocard Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background:#07111f;
      font-family:Arial;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <!-- Mobile Navbar -->
  <nav class="glass p-5 flex justify-between items-center sticky top-0 z-50">

    <div>

      <h1 class="text-2xl font-bold text-cyan-400">
        Rocard
      </h1>

      <p class="text-sm text-gray-400">
        Dashboard
      </p>

    </div>

    <button
      onclick="logout()"
      class="bg-red-500 px-5 py-2 rounded-xl font-bold"
    >
      Logout
    </button>

  </nav>

  <!-- Main -->
  <main class="p-5">

    <!-- Balance -->
    <section class="glass rounded-[30px] p-6">

      <p class="text-gray-400">
        TOTAL BALANCE
      </p>

      <h2 class="text-5xl font-bold mt-3">
        $0.00
      </h2>

      <button class="mt-6 bg-cyan-400 text-black px-6 py-3 rounded-2xl font-bold w-full">
        Start Tasks
      </button>

    </section>

    <!-- Features -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-8">

      <div class="glass rounded-3xl p-6">

        <div class="text-5xl">
          📋
        </div>

        <h3 class="text-2xl font-bold mt-4">
          Tasks
        </h3>

        <p class="text-gray-400 mt-2">
          Complete available activities.
        </p>

      </div>

      <div class="glass rounded-3xl p-6">

        <div class="text-5xl">
          💰
        </div>

        <h3 class="text-2xl font-bold mt-4">
          Rewards
        </h3>

        <p class="text-gray-400 mt-2">
          Receive earnings and bonuses.
        </p>

      </div>

      <div class="glass rounded-3xl p-6">

        <div class="text-5xl">
          ⚡
        </div>

        <h3 class="text-2xl font-bold mt-4">
          Fast Access
        </h3>

        <p class="text-gray-400 mt-2">
          Smooth mobile banking UI.
        </p>

      </div>

    </section>

  </main>

  <!-- Mobile Bottom Nav -->
  <div class="fixed bottom-0 left-0 w-full glass p-4 flex justify-around md:hidden">

    <button class="text-cyan-400">
      Home
    </button>

    <button>
      Tasks
    </button>

    <button>
      Rewards
    </button>

    <button>
      Settings
    </button>

  </div>

  <script>

    const token =
    localStorage.getItem("token");

    if(!token){

      window.location.href = "/";

    }

    function logout(){

      localStorage.removeItem("token");

      window.location.href = "/";

    }

  </script>

</body>
</html>
